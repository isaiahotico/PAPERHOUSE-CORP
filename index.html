<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaperHouse Corp - Earning App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase Legacy SDKs for easier integration -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); }
        #adTaskCard { display: none; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-blue-700 text-white p-4 shadow-md sticky top-0 z-40">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-black text-xl tracking-tighter">PAPERHOUSE <span class="text-yellow-400">CORP</span></h1>
            <div id="balanceHeader" class="text-sm font-bold bg-blue-800 px-3 py-1 rounded-full">₱0.00</div>
        </div>
    </header>

    <main class="flex-grow container mx-auto p-4 max-w-md">
        
        <!-- Dashboard View -->
        <div id="view-dashboard">
            <div class="bg-white rounded-3xl p-8 shadow-xl text-center mb-6 border border-slate-100">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Available Balance</p>
                <h2 id="mainBalance" class="text-5xl font-black text-blue-700 mb-6">₱0.000</h2>
                <button onclick="handleAdClick()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transform active:scale-95 transition-all">
                    WATCH AD (₱0.01)
                </button>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-2 gap-4 mb-6 text-center">
                <div class="bg-white p-4 rounded-2xl shadow-sm">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Referrals</p>
                    <p id="statRefs" class="text-xl font-bold">0</p>
                </div>                <div class="bg-white p-4 rounded-2xl shadow-sm">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Ref. Earnings</p>
                    <p id="statRefEarnings" class="text-xl font-bold text-green-500">₱0.00</p>
                </div>
            </div>

            <!-- Referral Link -->
            <div class="bg-blue-50 p-5 rounded-2xl border border-blue-100 mb-6">
                <label class="text-xs font-bold text-blue-700 block mb-2">Share & Earn 20% Commission</label>
                <div class="flex gap-2">
                    <input type="text" id="refUrl" readonly class="flex-1 bg-white border-none text-xs p-2 rounded-lg">
                    <button onclick="copyRef()" class="bg-blue-700 text-white px-4 rounded-lg text-xs font-bold">COPY</button>
                </div>
            </div>

            <!-- Menu Grid -->
            <div class="grid grid-cols-3 gap-2">
                <button onclick="switchTab('withdraw')" class="p-3 bg-white rounded-xl shadow-sm text-xs font-bold"><i class="fa fa-wallet block mb-1 text-blue-600"></i> Withdraw</button>
                <button onclick="switchTab('history')" class="p-3 bg-white rounded-xl shadow-sm text-xs font-bold"><i class="fa fa-history block mb-1 text-blue-600"></i> History</button>
                <button onclick="promptAdmin()" class="p-3 bg-white rounded-xl shadow-sm text-xs font-bold"><i class="fa fa-lock block mb-1 text-slate-400"></i> Admin</button>
            </div>
        </div>

        <!-- Withdraw View -->
        <div id="view-withdraw" class="hidden animate-fade-in">
            <button onclick="switchTab('dashboard')" class="mb-4 text-blue-600 font-bold text-sm">← Back</button>
            <div class="bg-white p-6 rounded-3xl shadow-lg">
                <h3 class="text-xl font-bold mb-4">Request Payout</h3>
                <input type="text" id="drawNumber" placeholder="GCash Number or Email" class="w-full p-3 border rounded-xl mb-4 focus:ring-2 focus:ring-blue-500">
                <input type="number" id="drawAmount" placeholder="Amount (₱)" class="w-full p-3 border rounded-xl mb-6 focus:ring-2 focus:ring-blue-500">                <button onclick="submitWithdrawal()" class="w-full bg-blue-700 text-white py-4 rounded-xl font-bold">Submit Request</button>
            </div>
        </div>

        <!-- History View -->
        <div id="view-history" class="hidden">
            <button onclick="switchTab('dashboard')" class="mb-4 text-blue-600 font-bold text-sm">← Back</button>
            <div class="bg-white p-6 rounded-3xl shadow-lg">
                <h3 class="text-xl font-bold mb-4">My Withdrawals</h3>
                <div id="historyContainer" class="space-y-3">
                    <p class="text-slate-400 text-sm text-center">No transactions yet.</p>
                </div>
            </div>
        </div>

        <!-- Admin View -->
        <div id="view-admin" class="hidden">
            <button onclick="switchTab('dashboard')" class="mb-4 text-slate-600 font-bold text-sm">← Exit Admin</button>
            <div class="bg-white p-6 rounded-3xl shadow-lg border-2 border-red-100">
                <h3 class="text-xl font-bold mb-4 italic">Pending Approvals</h3>
                <div id="adminContainer" class="space-y-4"></div>
            </div>
        </div>

    </main>

    <!-- Ad Task Overlay (The Card) -->
    <div id="adTaskOverlay" class="fixed inset-0 bg-black/80 z-50 hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 text-center shadow-2xl">
            <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <span id="timerText" class="text-3xl font-black text-blue-700">20</span>
            </div>
            <h3 class="text-xl font-bold mb-2">Ad in Progress...</h3>
            <p class="text-slate-500 text-sm mb-6">Please stay on the opened tab for 20 seconds. <strong>Do not close it!</strong></p>
            <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                <div id="timerBar" class="bg-blue-600 h-full transition-all duration-1000" style="width: 100%"></div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-slate-100 p-6 text-center">
        <p id="footerTime" class="text-xs font-mono text-slate-500 mb-1"></p>
        <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">PaperHouse Corp © 2026</p>
    </footer>

    <!-- Load Logic -->
    <script src="app.js"></script>
</body>
</html>
